global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+).*"
        replacement: "${1}"

  - job_name: docker
    static_configs:
      - targets: [host.docker.internal:9323]

  - job_name: app
    static_configs:
      - targets: ["${APP_HOST:-localhost}:${APP_PORT:-8000}"]
    metrics_path: /metrics
